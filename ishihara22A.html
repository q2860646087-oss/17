<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你看到了什么？</title>
  <style>
    body { 
      text-align: center; 
      font-family: sans-serif; 
      padding: 20px; 
      background-color: #fff; 
    }
    h1 { 
      color: #333; 
      margin-top: 20px; 
    }
    p { 
      color: #555; 
      font-size: 1.2rem; 
      line-height: 1.8;
      margin: 10px auto; 
      max-width: 700px;
    }
    img { 
      max-width: 95%; 
      height: auto; 
      margin-top: 20px; 
      border: 2px solid #ccc; 
      border-radius: 8px; 
    }
  </style>
</head>
<body>
  <h1>你看到了什么？</h1>

  <p>正常色觉的人应该能描绘出蓝绿 / 黄绿的波浪线。</p>
  <p>红绿色盲的人会沿着蓝、绿、红三条线走。</p>
  <p>完全色盲的人将无法描绘任何线条。</p>

  <img src="https://www.colour-blindness.com/CBTests/ishihara/Plate22A.gif" alt="色觉测试图">
